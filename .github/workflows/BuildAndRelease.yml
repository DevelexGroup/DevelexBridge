name: Build and Release

on:
  push:
    tags:
      - "v[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.3.5) — leave empty to auto-increment patch from last tag"
        required: false
        default: ""

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Set Version
        id: vars
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $version = $env:GITHUB_REF_NAME -replace "^v", ""
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $lastTag = git describe --tags --abbrev=0 2>$null
            if ($lastTag) {
              $parts = ($lastTag -replace "^v", "").Split(".")
              $parts[-1] = [int]$parts[-1] + 1
              $version = $parts -join "."
            } else {
              $version = "1.0.0"
            }
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "App version: $version"

      - name: Restore dependencies
        run: dotnet restore DevelexBridge/DevelexBridge.sln

      - name: Publish Application
        run: >
          dotnet publish DevelexBridge/Bridge/Bridge.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:Version=${{ steps.vars.outputs.VERSION }}
          -o ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bridge-win-x64-${{ steps.vars.outputs.VERSION }}
          path: ./publish/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.vars.outputs.VERSION }}
          name: Release v${{ steps.vars.outputs.VERSION }}
          draft: false
          prerelease: false
          files: ./publish/Bridge*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}